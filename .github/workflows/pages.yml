name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install
        env:
          NODE_ENV: development

      - name: Build
        run: |
          set -e
          export NODE_OPTIONS=--max-old-space-size=4096
          npm run build
          echo "=== dist/index.html after build ==="
          cat dist/index.html | grep 'src="' || true
          if grep -q 'src/main.tsx' dist/index.html; then
            echo "ERROR: dist/index.html still contains dev src/main.tsx!"
            echo "=== vite version ==="
            npx vite --version
            echo "=== node_modules/vite exists? ==="
            test -d node_modules/vite && echo "YES" || echo "NO"
            echo "=== dist contents ==="
            ls -la dist/
            exit 1
          fi
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Add SPA redirect
        run: cp dist/index.html dist/404.html

      - name: Disable Jekyll
        run: touch dist/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          enable_jekyll: false
