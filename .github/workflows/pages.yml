name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build
        run: |
          set -e
          export NODE_OPTIONS=--max-old-space-size=4096
          npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          GITHUB_PAGES: true

      - name: Add SPA redirect
        run: cp dist/index.html dist/404.html

      - name: Debug dist contents
        run: |
          echo "=== dist/index.html (first 5 lines) ==="
          cat dist/index.html | head -5
          echo "=== dist/index.html (script src) ==="
          cat dist/index.html | grep 'src="'
          echo "=== dist/assets count ==="
          ls dist/assets/ | wc -l
          echo "=== dist/assets sample ==="
          ls dist/assets/ | head -5
          echo "=== dist/.nojekyll ==="
          test -f dist/.nojekyll && echo "EXISTS" || echo "MISSING"
          echo "=== dist/404.html ==="
          test -f dist/404.html && echo "EXISTS" || echo "MISSING"

      - name: Disable Jekyll
        run: touch dist/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
